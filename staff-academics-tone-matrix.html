<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Staff and academics audience | Digital tone matrix | University of Southampton</title>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', sans-serif;
            background: #F5F5F5;
        }
        #root {
            width: 100%;
            min-height: 100vh;
        }
        /* Ensure SVG scales properly */
        .matrix-svg-container {
            width: 100%;
            height: auto;
            display: block;
        }
        /* Font scaling for narrower viewports */
        @media (max-width: 768px) {
            #matrix-svg text {
                font-size: 140%;
            }
        }
        @media (max-width: 480px) {
            #matrix-svg text {
                font-size: 180%;
            }
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState } = React;

        const StaffAcademicsToneMatrix = () => {
          const [hoveredCell, setHoveredCell] = useState(null);
          const [showInternational, setShowInternational] = useState(false);
          const [showHighRisk, setShowHighRisk] = useState(false);

          const tonalValues = [
            { name: 'Engaging and creative', color: '#EA42CB', abbrev: 'Creative' },
            { name: 'Boldly optimistic', color: '#FCBC00', abbrev: 'Optimistic' },
            { name: 'Human and grounded', color: '#0C838C', abbrev: 'Human' },
            { name: 'Collectively driven', color: '#0C8C41', abbrev: 'Collective' },
            { name: 'Purposefully practical', color: '#002F4C', abbrev: 'Practical' }
          ];

          const intentModes = [
            'Information seeking',
            'Task execution',
            'Problem resolution',
            'Policy and governance',
            'Collaboration and contribution'
          ];

          const cellData = {
            'Information seeking': {
              'Engaging and creative': { 
                intensity: 0.2, 
                guidance: 'Very limited. Clarity over character.',
                description: 'Minimal creative expression. Focus on findability.'
              },
              'Boldly optimistic': { 
                intensity: 0.05, 
                guidance: 'Suppressed. Avoid promotional tone.',
                description: 'No optimistic framing in information delivery.'
              },
              'Human and grounded': { 
                intensity: 0.45, 
                guidance: 'Light support. Accessible language.',
                description: 'Supportive warmth without emotional weight.'
              },
              'Collectively driven': { 
                intensity: 0.2, 
                guidance: 'Minimal. Neutral institutional voice.',
                description: 'Institutional context without active belonging.'
              },
              'Purposefully practical': { 
                intensity: 1.0, 
                guidance: 'Dominant. Speed and clarity paramount.',
                description: 'Clear, scannable, task-focused content.'
              }
            },
            'Task execution': {
              'Engaging and creative': { 
                intensity: 0.05, 
                guidance: 'Suppressed. Get out of the way.',
                description: 'No creative flourishes during task completion.'
              },
              'Boldly optimistic': { 
                intensity: 0.05, 
                guidance: 'Suppressed. No motivational tone.',
                description: 'Task-focused, not aspirational.'
              },
              'Human and grounded': { 
                intensity: 0.2, 
                guidance: 'Very light. Supportive microcopy only.',
                description: 'Minimal reassurance without distraction.'
              },
              'Collectively driven': { 
                intensity: 0.05, 
                guidance: 'Suppressed. Individual action focus.',
                description: 'User is acting alone; no collective framing.'
              },
              'Purposefully practical': { 
                intensity: 1.0, 
                guidance: 'Dominant. Cognitive load already high.',
                description: 'Clear instructions, logical sequence, minimal friction.'
              }
            },
            'Problem resolution': {
              'Engaging and creative': { 
                intensity: 0.2, 
                guidance: 'Minimal. Appropriate seriousness.',
                description: 'Acknowledge difficulty without levity.'
              },
              'Boldly optimistic': { 
                intensity: 0.2, 
                guidance: 'Constrained. Never breezy.',
                description: 'Cautious optimism about resolution, not dismissive.'
              },
              'Human and grounded': { 
                intensity: 1.0, 
                guidance: 'Dominant. Be competent, then be kind.',
                description: 'Warmth rises here. Empathy with action.'
              },
              'Collectively driven': { 
                intensity: 0.45, 
                guidance: 'Light. "We\'re working on this."',
                description: 'Institutional accountability and support.'
              },
              'Purposefully practical': { 
                intensity: 0.75, 
                guidance: 'Strong. Solutions before sympathy.',
                description: 'Clear paths to resolution with empathetic framing.'
              }
            },
            'Policy and governance': {
              'Engaging and creative': { 
                intensity: 0.05, 
                guidance: 'Absent. Authority without arrogance.',
                description: 'No creative interpretation of rules.'
              },
              'Boldly optimistic': { 
                intensity: 0.05, 
                guidance: 'Absent. Avoid perceived spin.',
                description: 'State requirements without editorial framing.'
              },
              'Human and grounded': { 
                intensity: 0.2, 
                guidance: 'Minimal. Firm but not harsh.',
                description: 'Accessible language without softening requirements.'
              },
              'Collectively driven': { 
                intensity: 0.6, 
                guidance: 'Moderate. Institutional voice.',
                description: 'Clear institutional authority and rationale.'
              },
              'Purposefully practical': { 
                intensity: 1.0, 
                guidance: 'Dominant. Compliance clarity essential.',
                description: 'Unambiguous requirements and consequences.'
              }
            },
            'Collaboration and contribution': {
              'Engaging and creative': { 
                intensity: 0.35, 
                guidance: 'Limited but allowed. Identity matters.',
                description: 'Appropriate expressiveness for community building.'
              },
              'Boldly optimistic': { 
                intensity: 0.3, 
                guidance: 'Light. Evidence-based encouragement.',
                description: 'Genuine appreciation without hyperbole.'
              },
              'Human and grounded': { 
                intensity: 0.75, 
                guidance: 'Strong. You belong here.',
                description: 'Warmth, recognition, and authentic welcome.'
              },
              'Collectively driven': { 
                intensity: 1.0, 
                guidance: 'Dominant. Your contribution matters.',
                description: 'Clear sense of community and shared purpose.'
              },
              'Purposefully practical': { 
                intensity: 0.6, 
                guidance: 'Supportive. Clear participation pathways.',
                description: 'Practical mechanisms for contribution.'
              }
            }
          };

          const internationalAffectedCells = [
            'Information seeking',
            'Policy and governance'
          ];

          const highRiskAffectedCells = [
            'Task execution',
            'Policy and governance'
          ];

          const getIntensityLabel = (intensity) => {
            if (intensity >= 0.9) return 'Dominant';
            if (intensity >= 0.7) return 'Strong';
            if (intensity >= 0.4) return 'Supportive';
            if (intensity >= 0.15) return 'Minimal';
            return 'Suppressed';
          };

          const exportSVG = () => {
            const svg = document.getElementById('matrix-svg');
            const svgData = new XMLSerializer().serializeToString(svg);
            const blob = new Blob([svgData], { type: 'image/svg+xml' });
            const url = URL.createObjectURL(blob);
            const link = document.createElement('a');
            link.href = url;
            link.download = 'staff-academics-tone-matrix.svg';
            link.click();
            URL.revokeObjectURL(url);
          };

          const exportPNG = () => {
            const svg = document.getElementById('matrix-svg');
            const canvas = document.createElement('canvas');
            canvas.width = 2500;
            canvas.height = 1600;
            const ctx = canvas.getContext('2d');
            const svgData = new XMLSerializer().serializeToString(svg);
            const img = new Image();
            img.onload = () => {
              ctx.fillStyle = 'white';
              ctx.fillRect(0, 0, canvas.width, canvas.height);
              ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
              canvas.toBlob((blob) => {
                const url = URL.createObjectURL(blob);
                const link = document.createElement('a');
                link.href = url;
                link.download = 'staff-academics-tone-matrix.png';
                link.click();
                URL.revokeObjectURL(url);
              });
            };
            img.src = 'data:image/svg+xml;base64,' + btoa(unescape(encodeURIComponent(svgData)));
          };

          return (
            <div className="w-full mx-auto p-4 sm:p-6 lg:p-8 bg-gray-50">
              <div className="mb-4 sm:mb-8">
                <h1 className="text-2xl sm:text-3xl font-bold text-gray-900 mb-2">
                  Staff and academics tone matrix
                </h1>
                <p className="text-sm sm:text-base text-gray-600 mb-4">
                  Intent-based tonal guidance for staff and academic audiences. 
                  Cell intensity shows appropriateness of each tonal value in each context.
                </p>
                
                <div className="flex flex-col sm:flex-row flex-wrap gap-2 sm:gap-4 items-start sm:items-center">
                  <div className="flex items-center gap-2">
                    <label className="flex items-center gap-2 cursor-pointer">
                      <input
                        type="checkbox"
                        checked={showInternational}
                        onChange={(e) => setShowInternational(e.target.checked)}
                        className="w-4 h-4"
                      />
                      <span className="text-xs sm:text-sm font-medium text-gray-700">
                        International context markers
                      </span>
                    </label>
                  </div>
                  
                  <div className="flex items-center gap-2">
                    <label className="flex items-center gap-2 cursor-pointer">
                      <input
                        type="checkbox"
                        checked={showHighRisk}
                        onChange={(e) => setShowHighRisk(e.target.checked)}
                        className="w-4 h-4"
                      />
                      <span className="text-xs sm:text-sm font-medium text-gray-700">
                        High-risk markers
                      </span>
                    </label>
                  </div>

                  <div className="flex gap-2 w-full sm:w-auto sm:ml-auto">
                    <button
                      onClick={exportSVG}
                      className="flex-1 sm:flex-none px-4 py-2 bg-blue-600 text-white text-xs sm:text-sm font-medium rounded-lg hover:bg-blue-700 transition"
                    >
                      Export SVG
                    </button>
                    <button
                      onClick={exportPNG}
                      className="flex-1 sm:flex-none px-4 py-2 bg-blue-600 text-white text-xs sm:text-sm font-medium rounded-lg hover:bg-blue-700 transition"
                    >
                      Export PNG (2x)
                    </button>
                  </div>
                </div>
              </div>

              <div className="bg-white p-3 sm:p-6 rounded-lg shadow-lg">
                <svg
                  id="matrix-svg"
                  viewBox="0 0 1250 800"
                  className="matrix-svg-container w-full"
                  preserveAspectRatio="xMidYMid meet"
                >
                  <text x="625" y="30" textAnchor="middle" style={{ fontSize: '20px', fontWeight: 'bold', fill: '#1f2937' }}>
                    Staff and academics: intent-based tone matrix
                  </text>

                  <text x="625" y="50" textAnchor="middle" style={{ fontSize: '14px', fill: '#6b7280' }}>
                    Cell intensity indicates appropriateness of tonal value in each intent mode
                  </text>

                  {intentModes.map((mode, i) => {
                    const x = 200 + i * 200;
                    const words = mode.split(' ');
                    
                    return (
                      <g key={mode}>
                        {words.map((word, j) => (
                          <text
                            key={j}
                            x={x + 100}
                            y={100 + j * 18}
                            textAnchor="middle"
                            style={{ fontSize: '13px', fontWeight: 600, fill: '#1f2937' }}
                          >
                            {word}
                          </text>
                        ))}
                        
                        {showHighRisk && highRiskAffectedCells.includes(mode) && (
                          <g>
                            <rect
                              x={x + 5}
                              y={160}
                              width={190}
                              height={500}
                              fill="none"
                              stroke="#dc2626"
                              strokeWidth="2"
                              strokeDasharray="5,5"
                              opacity="0.5"
                            />
                            <text
                              x={x + 100}
                              y={155}
                              textAnchor="middle"
                              style={{ fontSize: '11px', fontWeight: 600, fill: '#dc2626' }}
                            >
                              High-risk mode
                            </text>
                          </g>
                        )}

                        {showInternational && internationalAffectedCells.includes(mode) && (
                          <text
                            x={x + 100}
                            y={675}
                            textAnchor="middle"
                            style={{ fontSize: '11px', fontWeight: 600, fill: '#2563eb' }}
                          >
                            International context applies
                          </text>
                        )}
                      </g>
                    );
                  })}

                  {tonalValues.map((tonal, i) => {
                    const y = 170 + i * 100;
                    
                    return (
                      <g key={tonal.name}>
                        <rect
                          x="20"
                          y={y}
                          width="160"
                          height="80"
                          fill={tonal.color}
                          opacity="0.15"
                          rx="4"
                        />
                        <rect
                          x="20"
                          y={y}
                          width="8"
                          height="80"
                          fill={tonal.color}
                          opacity="1"
                          rx="4"
                        />

                        <text
                          x="100"
                          y={y + 35}
                          textAnchor="middle"
                          style={{ fontSize: '13px', fontWeight: 600, fill: '#1f2937' }}
                        >
                          {tonal.name.split(' ')[0]}
                        </text>
                        <text
                          x="100"
                          y={y + 52}
                          textAnchor="middle"
                          style={{ fontSize: '13px', fontWeight: 600, fill: '#1f2937' }}
                        >
                          {tonal.name.split(' ').slice(1).join(' ')}
                        </text>
                      </g>
                    );
                  })}

                  {intentModes.map((mode, colIndex) => {
                    const x = 200 + colIndex * 200;
                    
                    return tonalValues.map((tonal, rowIndex) => {
                      const y = 170 + rowIndex * 100;
                      const cellInfo = cellData[mode][tonal.name];
                      const cellKey = `${colIndex}-${rowIndex}`;
                      const isHovered = hoveredCell === cellKey;

                      return (
                        <g key={cellKey}>
                          <rect
                            x={x + 10}
                            y={y}
                            width="180"
                            height="80"
                            fill={tonal.color}
                            opacity={cellInfo.intensity}
                            stroke={isHovered ? '#1f2937' : '#e5e7eb'}
                            strokeWidth={isHovered ? 2 : 1}
                            rx="4"
                            style={{ cursor: 'pointer' }}
                            onMouseEnter={() => setHoveredCell(cellKey)}
                            onMouseLeave={() => setHoveredCell(null)}
                            onTouchStart={() => setHoveredCell(cellKey)}
                          />
                          
                          {isHovered && (
                            <text
                              x={x + 100}
                              y={y + 45}
                              textAnchor="middle"
                              style={{ 
                                fontSize: '12px', 
                                fontWeight: 'bold', 
                                fill: cellInfo.intensity <= 0.2 ? '#111827' : 'white',
                                // Dark text needs a light halo; light text needs a dark halo
                                filter: cellInfo.intensity <= 0.2
                                  ? 'drop-shadow(0 0 4px rgba(255,255,255,0.85))'
                                  : 'drop-shadow(0 0 4px rgba(0,0,0,0.5))'
                              }}
                            >
                              {getIntensityLabel(cellInfo.intensity)}
                            </text>
                          )}
                        </g>
                      );
                    });
                  })}

                  <g transform="translate(50, 700)">
                    <text x="0" y="0" style={{ fontSize: '12px', fontWeight: 600, fill: '#4b5563' }}>
                      Intensity levels:
                    </text>
                    {[
                      { label: 'Dominant', opacity: 1.0 },
                      { label: 'Strong', opacity: 0.75 },
                      { label: 'Supportive', opacity: 0.45 },
                      { label: 'Minimal', opacity: 0.2 },
                      { label: 'Suppressed', opacity: 0.05 }
                    ].map((level, i) => (
                      <g key={level.label} transform={`translate(${i * 140}, 15)`}>
                        <rect
                          x="0"
                          y="0"
                          width="30"
                          height="20"
                          fill="#6b7280"
                          opacity={level.opacity}
                          stroke="#9ca3af"
                          strokeWidth="1"
                        />
                        <text x="35" y="15" style={{ fontSize: '12px', fill: '#4b5563' }}>
                          {level.label}
                        </text>
                      </g>
                    ))}
                  </g>
                </svg>
              </div>

              {hoveredCell && (
                <div className="mt-6 p-6 bg-blue-50 border border-blue-200 rounded-lg">
                  <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div>
                      <h3 className="text-sm font-semibold text-gray-700 mb-2">Context</h3>
                      <p className="text-lg font-bold text-gray-900 mb-1">
                        {intentModes[Math.floor(hoveredCell.split('-')[0])]}
                      </p>
                      <p className="text-md font-semibold text-gray-700">
                        {tonalValues[hoveredCell.split('-')[1]].name}
                      </p>
                      <p className="text-sm text-gray-600 mt-2">
                        Intensity: <span className="font-semibold">
                          {getIntensityLabel(
                            cellData[intentModes[Math.floor(hoveredCell.split('-')[0])]]
                              [tonalValues[hoveredCell.split('-')[1]].name].intensity
                          )}
                        </span>
                      </p>
                    </div>
                    
                    <div>
                      <h3 className="text-sm font-semibold text-gray-700 mb-2">Guidance</h3>
                      <p className="text-sm text-gray-800 mb-3">
                        {cellData[intentModes[Math.floor(hoveredCell.split('-')[0])]]
                          [tonalValues[hoveredCell.split('-')[1]].name].guidance}
                      </p>
                      <p className="text-sm text-gray-600">
                        {cellData[intentModes[Math.floor(hoveredCell.split('-')[0])]]
                          [tonalValues[hoveredCell.split('-')[1]].name].description}
                      </p>
                    </div>
                  </div>
                </div>
              )}

              <div className="mt-8 grid grid-cols-1 md:grid-cols-3 gap-4">
                <div className="p-4 bg-teal-50 border border-teal-200 rounded-lg">
                  <h3 className="text-sm font-semibold text-teal-900 mb-2">
                    Problem resolution: warmth rises
                  </h3>
                  <p className="text-sm text-teal-800">
                    The only mode where human/grounded becomes dominant. 
                    Be competent, then be kind.
                  </p>
                </div>
                
                <div className="p-4 bg-slate-50 border border-slate-200 rounded-lg">
                  <h3 className="text-sm font-semibold text-slate-900 mb-2">
                    Task execution: get out of the way
                  </h3>
                  <p className="text-sm text-slate-800">
                    Almost monochrome in tone. Cognitive load is already high—
                    clarity without character.
                  </p>
                </div>
                
                <div className="p-4 bg-green-50 border border-green-200 rounded-lg">
                  <h3 className="text-sm font-semibold text-green-900 mb-2">
                    Collaboration: most balanced
                  </h3>
                  <p className="text-sm text-green-800">
                    Identity and belonging matter here. Collective tone dominates,
                    supported by warmth and practical pathways.
                  </p>
                </div>
              </div>

              <div className="mt-4 sm:mt-8 p-3 sm:p-6 bg-gray-50 border border-gray-200 rounded-lg">
                <h3 className="text-base sm:text-lg font-semibold text-gray-900 mb-3">
                  How to use this matrix
                </h3>
                <div className="space-y-3 text-xs sm:text-sm text-gray-700">
                  <p>
                    <strong>Unlike UG/PG spectra,</strong> this matrix models situational intent 
                    rather than emotional journey. Staff and academics switch between these modes 
                    repeatedly.
                  </p>
                  <p>
                    <strong>Cell intensity</strong> shows permission, not prescription. 
                    A 'suppressed' cell means that tonal quality is inappropriate in that context, 
                    not that the content should be emotionless.
                  </p>
                  <p>
                    <strong>Overlays are annotations,</strong> not structural changes. 
                    International context applies to specific content instances (visa guidance, 
                    international HR processes). High-risk markers highlight inherently 
                    sensitive modes.
                  </p>
                  <p>
                    <strong>Practical tone is baseline,</strong> not fallback. 
                    It dominates most modes because staff content prioritises clarity and 
                    efficiency over narrative or persuasion.
                  </p>
                </div>
              </div>
            </div>
          );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<StaffAcademicsToneMatrix />);
    </script>
</body>
</html>
